name: 06 - Contexts
run-name: 06 - Contexts | DEBUG - ${{ inputs.debug }}    

on: 
    push:
    workflow_dispatch:
        inputs:
            debug:
                type: boolean
                default: false

env:
    MY_WORKFLOW_VAR: 'workflow'
    MY_OVERWRITTEN_VAR: 'workflow'



jobs:
  echo-data:
    runs-on: ubuntu-latest
    env:
        MY_JOB_VAR: 'job'
        MY_OVERWRITTEN_VAR: 'job'

    steps:
      - name: Display information
        run: |
          echo "Event Name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run number: ${{ github.run_number }}"
      - name: Retrieve Variabe
        run: |
            echo "Variable name: ${{ vars.MY_VAR }}"   
      
      - name: Retrieve Env
        env: 
            MY_OVERWRITTEN_VAR: 'step'
        run: |
            echo "workflow Env variable name: ${{ env.MY_WORKFLOW_VAR }}"
            echo "workflow overwritten Env variable name: ${{ env.MY_OVERWRITTEN_VAR }}"
            echo "job Env variable name: ${{ env.MY_JOB_VAR }}"
            echo "job overwritten Env variable name: ${{ env.MY_OVERWRITTEN_VAR }}"   
               
      - name: Retrieve Env 2
        run: |
            echo "workflow Env variable name: ${{ env.MY_WORKFLOW_VAR }}"
            echo "workflow overwritten Env variable name: ${{ env.MY_OVERWRITTEN_VAR }}"
            echo "job Env variable name: ${{ env.MY_JOB_VAR }}"
            echo "job overwritten Env variable name: ${{ env.MY_OVERWRITTEN_VAR }}"      